version: '3.8'

services:
  frontend:
    build:
      context: .
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
        - VITE_APP_URL=${VITE_APP_URL}
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eleveto_realestate_frontend.rule=Host(`realestateflow.elevetoai.com`)"
      - "traefik.http.services.eleveto_realestate_frontend.loadbalancer.server.port=80"
    environment:
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
      - VITE_APP_URL=${VITE_APP_URL}
  whatsapp-agent:
    build: ./whatsapp-agent
    restart: always
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eleveto_realestate_agent.rule=Host(`agent.elevetoai.com`)"
      - "traefik.http.services.eleveto_realestate_agent.loadbalancer.server.port=3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - VITE_APP_URL=${VITE_APP_URL}
