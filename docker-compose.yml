version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rajesh_postgres
    restart: always
    environment:
      POSTGRES_DB: rajesh_realestate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
        - VITE_APP_URL=${VITE_APP_URL}
    restart: always
    environment:
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
      - VITE_APP_URL=${VITE_APP_URL}

  whatsapp_agent:
    build:
      context: ./whatsapp-agent
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - postgres
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - VITE_APP_URL=${VITE_APP_URL}
      - PORT=${PORT}
      - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/rajesh_realestate

volumes:
  postgres_data:

